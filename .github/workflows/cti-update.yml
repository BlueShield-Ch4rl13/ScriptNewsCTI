name: CTI Update

on:
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas (UTC)
  workflow_dispatch:          # permite lanzarlo a mano

permissions:
  contents: write

# Nunca dos ejecuciones a la vez: evita carreras al hacer push
concurrency:
  group: cti-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline CTI
        env:
          ABUSECH_API_KEY: ${{ secrets.ABUSECH_API_KEY }}
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
        run: python main.py

      - name: Commit y push de cambios
        run: |
          git config user.name "cti-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ README.md
          if git diff --cached --quiet; then
            echo "Sin cambios que publicar"
            exit 0
          fi
          git commit -m "CTI update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # El remoto puede haber avanzado durante la ejecución (p. ej. una
          # subida manual de ficheros): se rebasa encima antes de publicar.
          # Si un fichero generado entra en conflicto, gana la versión recién
          # generada (en un rebase, -X theirs = los commits que se reaplican).
          git pull --rebase -X theirs origin main
          git push
