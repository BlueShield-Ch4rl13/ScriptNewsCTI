name: CTI Update

on:
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas (UTC)
  workflow_dispatch:          # permite lanzarlo a mano

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline CTI
        env:
          ABUSECH_API_KEY: ${{ secrets.ABUSECH_API_KEY }}
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
        run: python main.py

      - name: Commit y push de cambios
        run: |
          git config user.name "cti-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ README.md
          git diff --cached --quiet || git commit -m "CTI update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
